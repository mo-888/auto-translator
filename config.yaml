# auto-translator 配置示例
# 运行: python translate.py --config config.yaml
# 强制重新翻译: python translate.py --config config.yaml --force

# ===== 必需字段 =====
input_dir: './docs'           # 要翻译的根目录
output_dir: './translated'    # 可选，不填则在原文件旁生成翻译文件
source_lang: 'en'             # 源语言代码（不填则本地模式自动检测，AI 模式报错）
languages: ['zh', 'es', 'ja'] # 目标语言列表

file_patterns:
  include: '.*\.md$'         # 正则：包含哪些文件（单引号避免 YAML 转义问题）
  exclude: '.*_zh\..*|.*_es\..*|.*_ja\..*'  # 排除已翻译文件

translation_type: 'local'     # 'local'（argos-translate）或 'ai'（OpenAI 风格 API）
deep_translation: true        # 深度翻译：自动调整跨文件链接

# ===== 本地模式配置（translation_type = 'local' 时使用）=====
local_config:
  engine: 'argos-translate'
  # 语言包需提前安装，工具不自动下载：
  #   pip install argos-translate
  #   argospm install translate-en_zh
  #   argospm install translate-en_es
  #   argospm install translate-en_ja

# ===== AI 模式配置（translation_type = 'ai' 时使用）=====
# 取消注释并填写以下字段以启用 AI 翻译
# ai_config:
#   endpoint: 'https://api.openai.com/v1/chat/completions'
#   api_key: 'sk-xxx'
#   model: 'gpt-4'
#   temperature: 0.3
#   max_tokens: 2000
#   system_prompt: |
#       # Role
#       You are an expert Technical Documentation Localization Specialist and Professional Translator with extensive experience in translating Markdown documents from {source_lang} to {target_lang}.

#       # Objective
#       Accurately translate the provided Markdown document while strictly preserving its original structure, formatting, and technical integrity. Only the natural language text should be translated.

#       # Strict Constraints & Rules
#       1. **Glossary Adherence**: Strictly follow the provided Glossary. If a term from the glossary appears in the source text, you MUST use the exact specified translation. Do not invent alternative translations for these specific terms.
#       2. **Markdown Preservation**: Keep all Markdown syntax intact. This includes headers (#), bold/italic text (** or *), lists, blockquotes, and tables. Do not add extra spaces inside inline formatting (e.g., `** text **` is incorrect, `**text**` is correct).
#       3. **Code Blocks & Inline Code**: NEVER translate content inside code blocks (```code```) or inline code (`code`). Keep them exactly as they are.
#       4. **Links & Images**: Translate the alt text or link text, but NEVER modify the URLs, file paths, or anchor links. Format: `[translated text](original_url)`.
#       5. **Frontmatter Handling**: If the document contains YAML frontmatter (enclosed by `---`), do not translate the keys (e.g., keep `title:`, `date:`, `tags:` intact). Only translate the string values if they represent natural language. Leave dates, booleans, and arrays of tags untouched.
#       6. **Tone and Style**: Maintain a professional, accurate, and clear tone primarily suited for technical documentation. If the context shifts to a more conversational or general document type, adapt the style to be natural and fluent while retaining strict accuracy.
#       7. **Completeness & Clean Output**: Translate every single paragraph. Do not summarize, omit, or add any conversational filler. Output ONLY the translated Markdown.

#       # Output Format
#       Return ONLY the translated Markdown content. Do NOT wrap the entire output in a markdown code block (e.g., do not start with ```markdown).
#   user_prompt_template: '请翻译以下文本到 {target_lang}：\n\n{content}'
#   retry_statuses: [429, 500, 502, 503, 504]
#   retry_max: 3
#   retry_backoff_factor: 2

# ===== 全局选项 =====
max_workers: 4                # 并发翻译文件数
dry_run: false                # true：只列出待处理文件，不实际翻译
quiet: false                  # true：只输出错误日志
cache: true                   # true：基于 SHA256 哈希跳过未修改文件
# glossary: './glossary.csv'  # 术语表（仅 AI 模式生效），格式：source,target
verify: false                 # true：检查翻译完整性，报告缺失文件
